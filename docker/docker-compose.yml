# docker-compose.yml (Simplified version for Docker 29.2.1)
name: syntax-analyzer

services:
  # Main web application
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: syntax-analyzer-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret-key-change-this
      - MAX_REPO_SIZE=100MB
      - MAX_FILES=10000
    networks:
      - analyzer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for caching (simplified)
  redis:
    image: redis:7-alpine
    container_name: syntax-analyzer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - analyzer-network
    command: redis-server --appendonly yes

networks:
  analyzer-network:
    driver: bridge

volumes:
  redis-data: